<!DOCTYPE html>

    <title>BEB Master Dispatcher - 34 Runs</title>
    <style>
        :root { --primary: #004a99; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        /* Left Column: Fleet Status */
        #fleet-col { width: 30%; border-right: 2px solid #ddd; padding: 20px; overflow-y: auto; background: white; }
        
        /* Right Column: Work Pool */
        #work-col { width: 70%; padding: 20px; overflow-y: auto; }

        .bus-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .bus-card:hover { border-color: var(--primary); background: #f0f7ff; }
        .bus-card.selected { border: 2px solid var(--primary); background: #ebf4ff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .run-item { display: inline-block; width: 180px; background: white; border: 1px solid #ccc; border-radius: 6px; padding: 10px; margin: 5px; font-size: 0.85em; vertical-align: top; }
        .run-item.assigned { opacity: 0.2; text-decoration: line-through; background: #eee; }
        .run-item.compatible { border: 2px solid var(--success); background: #eafff0; cursor: pointer; font-weight: bold; }
        .run-item.compatible:hover { background: var(--success); color: white; }

        .miles-bar { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .miles-fill { height: 100%; background: var(--success); transition: 0.3s; }
        .miles-over { background: var(--danger) !important; }

        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .badge { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 4px; }
        .rt71 { background: #ed8936; }
        .rt73 { background: #48bb78; }
        button { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
