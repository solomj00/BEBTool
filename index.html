<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEB Dispatch & Charge Optimizer</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        
        /* Left Sidebar: Active Assignments */
        #active-panel { width: 40%; border-right: 2px solid #ddd; padding: 20px; overflow-y: auto; background: white; }
        
        /* Right Sidebar: Suggestions */
        #suggestion-panel { width: 60%; padding: 20px; overflow-y: auto; }

        .bus-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .run-tag { display: inline-block; padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 0.85em; margin: 2px; border: 1px solid #ccc;}
        .compatible { border-left: 5px solid var(--success); }
        
        h2 { margin-top: 0; color: var(--primary); }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; }
        input, select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        .match-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .match-item { background: white; padding: 10px; border-radius: 6px; border: 1px solid #ddd; width: 200px; font-size: 0.9em; }
        .time-alert { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div id="active-panel">
    <h2>Active Dispatch</h2>
    <div class="input-box">
        <input type="text" id="busId" placeholder="Bus # (e.g. 4201)">
        <select id="runSelect"></select>
        <button onclick="assignBus()">Dispatch</button>
    </div>
    <div id="activeList"></div>
</div>

<div id="suggestion-panel">
    <h2>Compatibility Queue</h2>
    <div id="suggestions"></div>
</div>

<script>
    // The master data provided
    const allRuns = [
        {id: 1, rt: "73", mi: 60.0, start: "4:26a", end: "9:44a", startMin: 266, endMin: 584},
        {id: 2, rt: "71", mi: 84.2, start: "4:33a", end: "12:54p", startMin: 273, endMin: 774},
        {id: 3, rt: "73", mi: 87.0, start: "4:39a", end: "1:47p", startMin: 279, endMin: 827},
        {id: 4, rt: "73", mi: 50.1, start: "4:45a", end: "9:16a", startMin: 285, endMin: 556},
        {id: 5, rt: "71", mi: 60.2, start: "4:51a", end: "10:11a", startMin: 291, endMin: 611},
        {id: 17, rt: "71", mi: 74.1, start: "12:14p", end: "8:57p", startMin: 734, endMin: 1257},
        {id: 18, rt: "73", mi: 85.6, start: "12:22p", end: "10:02p", startMin: 742, endMin: 1322},
        {id: 21, rt: "73", mi: 60.0, start: "1:07p", end: "7:22p", startMin: 787, endMin: 1162},
        {id: 24, rt: "71", mi: 64.1, start: "1:43p", end: "9:32p", startMin: 823, endMin: 1292},
        {id: 27, rt: "73", mi: 63.4, start: "8:20p", end: "1:39x", startMin: 1220, endMin: 1539}
        // ... (truncated for space, but logic applies to all)
    ];

    let activeAssignments = [];

    // Initialize Dropdown
    const select = document.getElementById('runSelect');
    allRuns.forEach(r => {
        let opt = document.createElement('option');
        opt.value = r.id;
        opt.innerHTML = `Run ${r.id}: Rt ${r.rt} (${r.start}-${r.end})`;
        select.appendChild(opt);
    });

    function assignBus() {
        const id = document.getElementById('busId').value;
        const runId = document.getElementById('runSelect').value;
        if(!id) return alert("Enter Bus Number");
        
        const run = allRuns.find(r => r.id == runId);
        activeAssignments.push({bus: id, run: run});
        render();
    }

    function render() {
        const activeList = document.getElementById('activeList');
        const suggestions = document.getElementById('suggestions');
        activeList.innerHTML = "";
        suggestions.innerHTML = "";

        activeAssignments.forEach(assign => {
            // Create Active Card
            let card = document.createElement('div');
            card.className = "bus-card";
            card.innerHTML = `<strong>Bus ${assign.bus}</strong><br>Current: Run ${assign.run.id} (Rt ${assign.run.rt})<br>Ends: ${assign.run.end} | Mi: ${assign.run.mi}`;
            activeList.appendChild(card);

            // Calculate Matches
            let matchContainer = document.createElement('div');
            matchContainer.className = "bus-card compatible";
            matchContainer.innerHTML = `<h3>Options for Bus ${assign.bus}</h3>`;
            
            let group = document.createElement('div');
            group.className = "match-group";

            allRuns.forEach(nextRun => {
                const timeGap = nextRun.startMin - assign.run.endMin;
                const totalMi = assign.run.mi + nextRun.mi;

                // LOGIC: Gap > 30 mins AND Total < 150 miles
                if (timeGap >= 30 && totalMi <= 150) {
                    group.innerHTML += `
                        <div class="match-item">
                            <strong>Run ${nextRun.id} (Rt ${nextRun.rt})</strong><br>
                            Starts: ${nextRun.start}<br>
                            Gap: ${timeGap} mins<br>
                            Total Miles: ${totalMi.toFixed(1)}
                        </div>`;
                }
            });
            matchContainer.appendChild(group);
            suggestions.appendChild(matchContainer);
        });
    }
</script>
</body>
</html>
