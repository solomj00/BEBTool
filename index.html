<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEB Master Dispatcher - 34 Runs</title>
    <style>
        :root { --primary: #004a99; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        /* Left Column: Fleet Status */
        #fleet-col { width: 30%; border-right: 2px solid #ddd; padding: 20px; overflow-y: auto; background: white; }
        
        /* Right Column: Work Pool */
        #work-col { width: 70%; padding: 20px; overflow-y: auto; }

        .bus-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .bus-card:hover { border-color: var(--primary); background: #f0f7ff; }
        .bus-card.selected { border: 2px solid var(--primary); background: #ebf4ff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .run-item { display: inline-block; width: 180px; background: white; border: 1px solid #ccc; border-radius: 6px; padding: 10px; margin: 5px; font-size: 0.85em; vertical-align: top; }
        .run-item.assigned { opacity: 0.2; text-decoration: line-through; background: #eee; }
        .run-item.compatible { border: 2px solid var(--success); background: #eafff0; cursor: pointer; font-weight: bold; }
        .run-item.compatible:hover { background: var(--success); color: white; }

        .miles-bar { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .miles-fill { height: 100%; background: var(--success); transition: 0.3s; }
        .miles-over { background: var(--danger) !important; }

        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .badge { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 4px; }
        .rt71 { background: #ed8936; }
        .rt73 { background: #48bb78; }
        button { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="fleet-col">
    <h2>Active Fleet</h2>
    <button onclick="resetApp()">Reset All Data</button>
    <div id="busList"></div>
</div>

<div id="work-col">
    <h2>Unassigned Runs (34 Total)</h2>
    <p id="instruction">Select a bus on the left to see which runs it can safely perform.</p>
    <div id="runPool"></div>
</div>

<script>
    // THE FULL 34 RUN DATASET
    const allRuns = [
        {id: 1, rt: "73", mi: 60.025, s: "426a", e: "944a", sM: 266, eM: 584},
        {id: 2, rt: "71", mi: 84.244, s: "433a", e: "1254p", sM: 273, eM: 774},
        {id: 3, rt: "73", mi: 86.99, s: "439a", e: "147p", sM: 279, eM: 827},
        {id: 4, rt: "73", mi: 50.115, s: "445a", e: "916a", sM: 285, eM: 556},
        {id: 5, rt: "71", mi: 60.199, s: "451a", e: "1011a", sM: 291, eM: 611},
        {id: 6, rt: "73", mi: 77.081, s: "456a", e: "102p", sM: 296, eM: 782},
        {id: 7, rt: "73", mi: 24.71, s: "502a", e: "721a", sM: 302, eM: 441},
        {id: 8, rt: "71", mi: 84.244, s: "508a", e: "139p", sM: 308, eM: 819},

        {id: 14, rt: "71", mi: 27.191, s: "1040a", e: "1255p", sM: 640, eM: 775},
        {id: 15, rt: "71", mi: 27.129, s: "1159a", e: "209p", sM: 719, eM: 849},
        {id: 16, rt: "71", mi: 27.191, s: "1210p", e: "226p", sM: 730, eM: 866},
        {id: 17, rt: "71", mi: 74.129, s: "1214p", e: "857p", sM: 734, eM: 1257},

        {id: 28, rt: "73", mi: 50.968, s: "850p", e: "138x", sM: 1250, eM: 1538},
        {id: 29, rt: "71", mi: 50.23, s: "857p", e: "143x", sM: 1257, eM: 1543},
        {id: 30, rt: "73", mi: 51.737, s: "920p", e: "147x", sM: 1340, eM: 1547},
        {id: 31, rt: "71", mi: 54.126, s: "927p", e: "151x", sM: 1347, eM: 1551},
        {id: 32, rt: "73", mi: 52.703, s: "928p", e: "133x", sM: 1348, eM: 1533},
        {id: 33, rt: "73", mi: 41.723, s: "935p", e: "131x", sM: 1355, eM: 1531},
        {id: 34, rt: "73", mi: 41.723, s: "935p", e: "131x", sM: 1355, eM: 1531}
    ];

    let fleet = Array.from({length: 12}, (_, i) => ({ busId: 4201 + i, work: [], totalMi: 0 }));
    let selectedIdx = null;

    function render() {
        const busList = document.getElementById('busList');
        const runPool = document.getElementById('runPool');
        busList.innerHTML = "";
        runPool.innerHTML = "";

        fleet.forEach((bus, i) => {
            let card = document.createElement('div');
            card.className = `bus-card ${selectedIdx === i ? 'selected' : ''}`;
            card.onclick = () => { selectedIdx = i; render(); };
            
            let runs = bus.work.map(r => `<span class="badge rt${r.rt}">${r.rt}</span>`).join("");
            let barWidth = (bus.totalMi / 150) * 100;
            
            card.innerHTML = `<strong>Bus ${bus.busId}</strong> ${runs}<br>
                             <small>${bus.totalMi.toFixed(1)} / 150 Mi</small>
                             <div class="miles-bar"><div class="miles-fill ${bus.totalMi > 140 ? 'miles-over' : ''}" style="width:${barWidth}%"></div></div>`;
            busList.appendChild(card);
        });

        allRuns.forEach(run => {
            let isAssigned = fleet.some(b => b.work.some(r => r.id === run.id));
            let canDo = false;
            
            if (selectedIdx !== null && !isAssigned) {
                let bus = fleet[selectedIdx];
                let last = bus.work[bus.work.length - 1];
                let timeOk = !last || (run.sM - last.eM >= 30);
                let milesOk = (bus.totalMi + run.mi) <= 150;
                if(timeOk && milesOk) canDo = true;
            }

            let item = document.createElement('div');
            item.className = `run-item ${isAssigned ? 'assigned' : ''} ${canDo ? 'compatible' : ''}`;
            if(canDo) item.onclick = () => { fleet[selectedIdx].work.push(run); fleet[selectedIdx].totalMi += run.mi; render(); };
            
            item.innerHTML = `<strong>Run ${run.id}</strong> (Rt ${run.rt})<br>${run.s} - ${run.e}<br>${run.mi.toFixed(1)} miles`;
            runPool.appendChild(item);
        });
    }

    function resetApp() {
        fleet.forEach(b => { b.work = []; b.totalMi = 0; });
        selectedIdx = null;
        render();
    }

    render();
</script>
</body>
</html>
